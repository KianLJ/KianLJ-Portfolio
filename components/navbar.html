<script>
    // Detect current depth and adjust navbar links accordingly
    function adjustNavbarLinks() {
        // Determine current file path depth
        const currentPath = window.location.pathname;
        const pathParts = currentPath.split('/').filter(p => p.length > 0);
        
        // Check if we're in pages/ or pages/portfolio/
        let isInPages = currentPath.includes('/pages/');
        let isInPortfolio = currentPath.includes('/pages/portfolio/');
        
        let basePrefix = '';
        if (isInPortfolio) {
            basePrefix = '../../';
        } else if (isInPages) {
            basePrefix = '../';
        }
        
        // Update all navigation links
        document.getElementById('logo-link').href = basePrefix + 'index.html';
        document.querySelector('.nav-home').href = basePrefix + 'index.html';
        document.querySelector('.nav-projects').href = basePrefix + 'pages/projects.html';
        document.querySelector('.nav-skills').href = basePrefix + 'pages/skills.html';
        document.querySelector('.nav-contact').href = basePrefix + 'pages/contact.html';
    }
    
    // Adjust links when navbar is fully loaded
    adjustNavbarLinks();
</script>
